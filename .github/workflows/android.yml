name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer setuptools

      - name: Install Android SDK Build-Tools
        run: |
          # Устанавливаем стабильную версию инструментов
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "build-tools;30.0.3"
          # Делаем aidl доступным глобально
          sudo ln -sf $ANDROID_HOME/build-tools/30.0.3/aidl /usr/local/bin/aidl

      - name: Build with Buildozer
        run: |
          buildozer init
          # Настройки твоего "Маяка"
          sed -i 's/^requirements = .*/requirements = python3,kivy,kivymd,requests,urllib3,chardet,idna,certifi/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = mayakchat/' buildozer.spec
          sed -i 's/^title = .*/title = Mayak/' buildozer.spec
          sed -i 's/^#?android.permissions = .*/android.permissions = INTERNET/' buildozer.spec
          sed -i 's/^#?android.archs = .*/android.archs = arm64-v8a/' buildozer.spec
          sed -i 's/^#?icon.filename = .*/icon.filename = %(source.dir)s\/icon.png/' buildozer.spec
          
          # ПРИНУДИТЕЛЬНО указываем путь к SDK внутри команды
          export ANDROIDSDK=$ANDROID_HOME
          export ANDROIDNDK=$ANDROID_HOME/ndk-bundle
          buildozer -v android debug
